name: Steam Playtime Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      STEAM_PROFILE_XML_URL: ${{ vars.STEAM_PROFILE_XML_URL }}
      BARK_BASE_URL: ${{ secrets.BARK_BASE_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run monitor
        run: python steam_playtime_monitor.py

      - name: Commit state snapshot
        run: |
          if [ -z "$(git status --porcelain -- data/steam_recent_playtime_state.json)" ]; then
            echo "No state changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/steam_recent_playtime_state.json
          git commit -m "chore: update steam playtime snapshot"
          git push